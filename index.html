<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Hindi Document File Converter</title>
    <!-- Mammoth.js library to read .docx files directly in the browser -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background-color: #f5f7fb; color: #333; line-height: 1.6; }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .file-box { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; background: #f8fafc; transition: all 0.2s; }
        .file-box:hover { border-color: #3b82f6; background: #f0f7ff; }
        input[type="file"] { display: none; }
        button { display: inline-block; width: 100%; background-color: #3b82f6; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-top: 15px; }
        button:hover { background-color: #2563eb; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .download-btn { background-color: #10b981; display: none; }
        .download-btn:hover { background-color: #059669; }
        .status { text-align: center; font-weight: bold; margin-top: 15px; color: #475569; }
        textarea { width: 100%; height: 250px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; resize: vertical; margin-top: 15px; background: #fafafa; font-size: 15px; }
    </style>
</head>
<body>

    <h1>Smart Document Hindi Converter</h1>
    <p class="subtitle">Upload a Word file (.docx) or Text file (.txt). Converts Kruti Dev to Hindi and preserves real English!</p>

    <div class="card">
        <label for="fileInput">
            <div class="file-box" id="dropZone">
                <strong style="color: #2563eb;">Click to browse</strong> or drag & drop your document here
                <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Supports .docx and .txt files</div>
            </div>
        </label>
        <input type="file" id="fileInput" accept=".docx,.txt">
        
        <div class="status" id="statusMessage">No file selected</div>
        
        <button id="convertBtn" onclick="processUploadedFile()" disabled>Convert Document</button>
        <button id="downloadBtn" class="download-btn" onclick="downloadResultFile()">📥 Download Converted Document (.txt)</button>
    </div>

    <div class="card" id="previewCard" style="display:none;">
        <strong style="color: #475569;">Live Output Preview:</strong>
        <textarea id="outputPreview" readonly></textarea>
    </div>

    <script>
        let globalProcessedText = "";
        let uploadedFileName = "";
        let rawExtractedText = "";

        // Handle file selection visuals
        const fileInput = document.getElementById('fileInput');
        const statusMessage = document.getElementById('statusMessage');
        const convertBtn = document.getElementById('convertBtn');

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                uploadedFileName = file.name;
                statusMessage.innerHTML = `📄 Selected: <strong>${uploadedFileName}</strong>`;
                convertBtn.disabled = false;
                
                // Read file structure early
                const reader = new FileReader();
                if (uploadedFileName.endsWith('.txt')) {
                    reader.onload = function(e) { rawExtractedText = e.target.result; };
                    reader.readAsText(file);
                } else if (uploadedFileName.endsWith('.docx')) {
                    reader.onload = function(e) {
                        const arrayBuffer = e.target.result;
                        mammoth.extractRawText({arrayBuffer: arrayBuffer})
                            .then(function(result) {
                                rawExtractedText = result.value;
                            })
                            .catch(function(err) {
                                statusMessage.innerText = "Error parsing Word file layout.";
                            });
                    };
                    reader.readAsArrayBuffer(file);
                }
            }
        });

        // Exact character layout conversion library core
        function convertKrutiToUnicode(text) {
            let modified = text;
            modified = modified.replace(/([f])([a-zA-Z0-9\s])/g, '$2$1'); 
            modified = modified.replace(/([f])([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])/g, '$2$1');
            modified = modified.replace(/([f])(.)/g, '$2$1');

            const krutiDevChars = [
                "ñ","ड़","ढृ","मृ","कैल","कृ","ज्ञ","श","ष्","स","ह","क्ष","त्र","ज्ञ","श्र",
                "ाो","ाौ","ै","ो","ौ","ा","ी","ु","ू","ृ","े","ै","ॉ","ं","ः",
                "क","ख","ग","घ","ङ","च","छ","ज","झ","ञ","ट","ठ","ड","ढ","ण",
                "त","थ","द","ध","न","प","फ","ब","भ","म","य","र","ल","व","श",
                "ष","स","ह","क्ष","त्र","ज्ञ","श्र", "१","२","३","४","५","६","७","८","९","०",
                "v","o","V","O","f","ीं","ंि","ेिं","ैिं"
            ];
            const unicodeChars = [
                "त्र","ड़","ढ़","म्","कै","कृ","ज्ञ","श","ष","स","ह","क्ष","त्र","ज्ञ","श्र",
                "ो","ौ","ै","ो","ौ","ा","ी","ु","ू","ृ","े","ै","ॉ","ं","ः",
                "क","ख","ग","घ","ङ","च","छ","ज","झ","ञ","ट","ठ","ड","ढ","ण",
                "त","थ","द","ध","न","प","फ","ब","भ","म","य","र","ल","व","श",
                "ष","स","ह","क्ष","त्र","ज्ञ","श्र", "१","२","३","४","५","६","७","८","९","०",
                "अ","ओ","आ","औ","ि","ीं","िं","ेंि","ैंि"
            ];

            for (let i = 0; i < krutiDevChars.length; i++) {
                let searchChar = krutiDevChars[i].replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                modified = modified.replace(new RegExp(searchChar, 'g'), unicodeChars[i]);
            }

            const symbolsKeyMap = {
                "H": "भ", "t": "त", "j": "र", "d": "क", "u": "न", "v": "अ", "b": "इ", "k": "ा", "i": "ि",
                "e": "े", "]": "ै", "[": "ृ", ";": "ं", "Z": "्र", "`": "़", "x": "ग", "X": "घ", "c": "ब",
                "C": "व", "p": "छ", "P": "झ", "o": "व", "O": "इ", "l": "स", "L": "श", "g": "ह", "G": "क्ष",
                "h": "प", "f": "ि", "A": "ि", "S": "े", "D": "क", "F": "थ", "m": "म", "M": "ष", "n": "ल",
                "N": "ल", "q": "फ", "Q": "फ", "w": "ू", "W": "ू", "r": "ी", "R": "ी", "y": "थ", "Y": "थ",
                "s": "ए", "a": "ं", "z": "्र", "K": "ा", "J": "र", "I": "ि"
            };
            for (let key in symbolsKeyMap) {
                modified = modified.replace(new RegExp(key, 'g'), symbolsKeyMap[key]);
            }

            modified = modified.replace(/ि([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])/g, '$1ि');
            modified = modified.replace(/ि(.)/g, '$1ि');
            modified = modified.replace(/([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])ि/g, 'ि$1');
            modified = modified.replace(/([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])र्/g, 'र्$1');
            return modified;
        }

        // Logic processing block separating dictionary components
        function processUploadedFile() {
            if (!rawExtractedText) {
                statusMessage.innerText = "Processing failed. File empty or still loading.";
                return;
            }

            statusMessage.innerText = "Converting document data...";
            
            // Splits everything by spaces and line breaks to inspect structure piece-by-piece
            const fragments = rawExtractedText.split(/(\s+)/);
            
            let processedFragments = fragments.map(frag => {
                if (/^\s+$/.test(frag)) return frag; // Keep tabs and spacing intact
                
                // If it's a normal English word, keep it unchanged
                if (/^[A-Za-z]{2,15}$/.test(frag)) {
                    // Check if it's a known Kruti Dev pattern masquerading as English
                    if (/(Httj|dtiu|vfètfu|vuqltj|rtRi|dksbZ)/i.test(frag)) {
                        return convertKrutiToUnicode(frag);
                    }
                    return frag; // Valid English word (Leaves "Coffee", "Act", etc. untouched)
                }
                
                return convertKrutiToUnicode(frag);
            });

            globalProcessedText = processedFragments.join("");
            
            // Show preview and download options
            document.getElementById('outputPreview').value = globalProcessedText;
            document.getElementById('previewCard').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';
            statusMessage.innerHTML = "✅ <strong>Conversion complete!</strong>";
        }

        // Action function saving file back locally
        function downloadResultFile() {
            const blob = new Blob([globalProcessedText], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Converted_Hindi_" + uploadedFileName.replace(/\.[^/.]+$/, "") + ".txt";
            link.click();
        }
    </script>
</body>
</html>
