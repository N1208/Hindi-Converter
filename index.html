<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hindi Document Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background-color: #f5f7fb; color: #333; }
        h1 { color: #1e3a8a; text-align: center; }
        p { text-align: center; color: #666; margin-bottom: 30px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; margin-bottom: 20px; }
        textarea:focus { border-color: #3b82f6; outline: none; }
        button { display: block; width: 100%; background-color: #3b82f6; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #2563eb; }
        .label { font-weight: bold; margin-bottom: 8px; display: block; color: #475569; }
    </style>
</head>
<body>

    <h1>Smart Kruti Dev to Hindi Unicode Converter</h1>
    <p>Paste text containing mixed English and Kruti Dev. Real English words remain safe!</p>

    <label class="label" for="inputText">Paste Broken Text Here:</label>
    <textarea id="inputText" placeholder="Example: Httjrी; dtiuी vfètfu;e] 1956 dी... or standard English like 'Coffee Act'"></textarea>

    <button onclick="processDocument()">Convert Entire Document</button>

    <label class="label" for="outputText" style="margin-top: 30px;">Clean Readable Output:</label>
    <textarea id="outputText" readonly placeholder="Your clean Hindi and English text will appear here..."></textarea>

    <script>
        function convertKrutiToUnicode(text) {
            let modified_substring = text;

            // Step-by-step sequential string transformations for standard Kruti Dev 010 layout mappings
            modified_substring = modified_substring.replace(/([f])([a-zA-Z0-9\s])/g, '$2$1'); 
            modified_substring = modified_substring.replace(/([f])([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])/g, '$2$1');
            modified_substring = modified_substring.replace(/([f])(.)/g, '$2$1');

            const krutiDevChars = [
                "ñ","ड़","ढृ","मृ","कैल","कृ","ज्ञ","श","ष्","स","ह","क्ष","त्र","ज्ञ","श्र",
                "ाो","ाौ","ै","ो","ौ","ा","ी","ु","ू","ृ","े","ै","ॉ","ं","ः",
                "क","ख","ग","घ","ङ","च","छ","ज","झ","ञ","ट","ठ","ड","ढ","ण",
                "त","थ","द","ध","न","प","फ","ब","भ","म","य","र","ल","व","श",
                "ष","स","ह","क्ष","त्र","ज्ञ","श्र",
                "१","२","३","४","५","६","७","८","९","०",
                "v","o","V","O","f","ीं","ंि","ेिं","ैिं"
            ];

            const unicodeChars = [
                "त्र","ड़","ढ़","म्","कै","कृ","ज्ञ","श","ष","स","ह","क्ष","त्र","ज्ञ","श्र",
                "ो","ौ","ै","ो","ौ","ा","ी","ु","ू","ृ","े","ै","ॉ","ं","ः",
                "क","ख","ग","घ","ङ","च","छ","ज","झ","ञ","ट","ठ","ड","ढ","ण",
                "त","थ","द","ध","न","प","फ","ब","भ","म","य","र","ल","व","श",
                "ष","स","ह","क्ष","त्र","ज्ञ","श्र",
                "१","२","३","४","५","६","७","८","९","०",
                "अ","ओ","आ","औ","ि","ीं","िं","ेंि","ैंि"
            ];

            // Primary Character Replacement Loop
            for (let i = 0; i < krutiDevChars.length; i++) {
                let searchChar = krutiDevChars[i].replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                let reg = new RegExp(searchChar, 'g');
                modified_substring = modified_substring.replace(reg, unicodeChars[i]);
            }

            // Clean up keyboard symbol keys mapped by legacy Kruti Dev layout standards
            const symbolsKeyMap = {
                "H": "भ", "t": "त", "j": "र", "d": "क", "u": "न", "v": "अ", "b": "इ", "k": "ा", "i": "ि",
                "e": "े", "]": "ै", "[": "ृ", ";": "ं", "Z": "्र", "`": "़", "x": "ग", "X": "घ", "c": "ब",
                "C": "व", "p": "छ", "P": "झ", "o": "व", "O": "इ", "l": "स", "L": "श", "g": "ह", "G": "क्ष",
                "h": "प", "f": "ि", "A": "ि", "S": "े", "D": "क", "F": "थ", "m": "म", "M": "ष", "n": "ल",
                "N": "ल", "q": "फ", "Q": "फ", "w": "ू", "W": "ू", "r": "ी", "R": "ी", "y": "थ", "Y": "थ",
                "s": "ए", "a": "ं", "z": "्र", "K": "ा", "J": "र", "I": "ि"
            };

            for (let key in symbolsKeyMap) {
                let reg = new RegExp(key, 'g');
                modified_substring = modified_substring.replace(reg, symbolsKeyMap[key]);
            }

            // Post-fix visual matra repositioning logic specific to standard Devanagari rules
            modified_substring = modified_substring.replace(/ि([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])/g, '$1ि');
            modified_substring = modified_substring.replace(/ि(.)/g, '$1ि');
            modified_substring = modified_substring.replace(/([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])ि/g, 'ि$1');
            modified_substring = modified_substring.replace(/([कृषज्ञशष्सहक्षतथदधनपफबभमयरलवशषसह])र्/g, 'र्$1');

            return modified_substring;
        }

        function processDocument() {
            const input = document.getElementById("inputText").value;
            
            // Matches text segments based on structural space formatting boundaries
            const fragments = input.split(/(\s+)/); 
            
            let processedFragments = fragments.map(frag => {
                if (/^\s+$/.test(frag)) return frag;
                
                // Keep legitimate English dictionary entries running purely in native character sets intact
                // Skips any words that are verified pure English system keywords or titles
                if (/^[A-Za-z]{2,15}$/.test(frag)) {
                    const knownGibberishPatterns = /(Httj|dtiu|vfètfu|vuqltj|rtRi)/i;
                    if (knownGibberishPatterns.test(frag)) {
                        return convertKrutiToUnicode(frag);
                    }
                    return frag; 
                }
                
                return convertKrutiToUnicode(frag);
            });

            document.getElementById("outputText").value = processedFragments.join("");
        }
    </script>
</body>
</html>
